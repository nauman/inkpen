name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  ruby:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - "3.4.3"
    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Run the default task (test + rubocop)
        run: bundle exec rake

  js:
    runs-on: ubuntu-latest
    name: JS (vitest + bundle integrity)
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"
      - name: Install npm deps
        run: npm ci
      - name: Rebuild bundle
        run: npm run build
      - name: Verify bundle integrity (parse + exports + zero CDN refs)
        run: npm run build:check
      - name: Run round-trip tests
        run: npm test
        # Spec 01 has known catalogued failures today (7/12 fail).
        # CI doesn't block on these until spec 01 closes them out.
        continue-on-error: true
